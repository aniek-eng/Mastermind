<!DOCTYPE html>
<html>
<head>
  <title>Test Table</title>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <style> 
  table {width: 100%; font-size: 20px; border-collapse: collapse;text-align: center;}
  td {padding: 15px 25px; cursor: pointer;}
  td:hover {background: none;}
  td[link]:hover {background: #ff8a9d;}
  .outerborder {
  border-right: none;
  border-left: none;
  border-bottom: none;
  border-top: none;
  }
  .borderchange {
  border-right: none;
  border-bottom: none;
  }
  
  .borderchangerest {
  border-right: none;
  border-left: none;
  border-bottom: none;
  border-top: none;
  }
  
  .background {
  width: 100px;
  height: 50px;
  padding: 0;
  margin: 0;
}

.line {
  width: 112px;
  height: 47px;
  border-bottom: 1px solid rgb(7, 7, 7);
  transform: translateY(-20px) translateX(5px) rotate(27deg);
  position: absolute;
  z-index: -1;
}

.background>div {
  position: relative;
  height: 100%;
  width: 100%;
  top: 0;
  left: 0;
}

.bottom {
  position: absolute;
  bottom: 1px;
  left: 1px;
}

.top {
  position: absolute;
  top: 1px;
  right: 1px;
}
</style>
</head>
<body>

<h1>Knuths Algorithm</h1>

<table>
  <tr>
    <th class="background">
    <div><span class="bottom">Black</span>
      <span class="top">White</span>
      <div class="line"></div>
    </div>
  </th><th>0</th><th>1</th><th>2</th><th>3</th><th>4</th>
  </tr>
  <tr>
    <th>0</td><td link onclick="location.href='A.html'">\(256A\)</u></td><td link location.href='B.html'">\(256B\)</td><td link onclick="location.href='C.html'">\(96C\)</td><td link onclick="location.href='D.html'">\(16D\)</td><td>1</td>
  </tr>
  <tr>
    <th>1</td><td>256E</td><td>208F</td><td>36G</td><td>0</td><td class="borderchange"></td>
  </tr>
  <tr>
    <th>2</td><td link onclick="location.href='H.html'">114H</td><td>32I</td><td>4(1213)</td><td class="borderchange"></td><td class="borderchangerest"></td>
  </tr>
  <tr>
    <th>3</td><td>20J</td><td>0</td><td class="borderchange"></td><td class="borderchangerest"></td><td class="borderchangerest"></td>
  </tr>
  <tr>
    <th>4</td><td>(1)</td><td class="borderchange"></td><td class="borderchangerest"></td><td class="borderchangerest"></td><td class="borderchangerest"></td>
  </tr>

</table>

</body>
</html>
